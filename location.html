<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Visit Gavino's Pizzeria in Bearden, Knoxville — hours, map, and directions." />
    <title>Location | Gavino's Pizzeria and Restaurant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body data-page="location">
    <div id="site-header"></div>

    <header class="page-hero">
      <div class="container">
        <h1>Location &amp; Hours</h1>
        <p>Bearden — <span data-phone></span></p>
      </div>
    </header>

    <main class="section section--white">
      <div class="container">
        <div class="info-grid" style="margin-bottom: 2rem">
          <div class="info-block fade-in" style="background: var(--color-cream); color: var(--color-text)">
            <h3 style="color: var(--color-green-dark)">Address</h3>
            <p>
              <a href="https://maps.google.com/maps?q=5211+Kingston+Pike+Knoxville%2C+TN+37919" data-address></a>
            </p>
            <p><a href="tel:+18652005571" data-phone></a></p>
          </div>
          <div class="info-block fade-in" style="background: var(--color-cream); color: var(--color-text)">
            <h3 style="color: var(--color-green-dark)">Hours</h3>
            <ul class="hours-list" id="hours-list" style="color: var(--color-text)"></ul>
            <p id="hours-note" style="font-size: 0.9rem; color: var(--color-red)"></p>
          </div>
        </div>
        <iframe
          class="map-embed fade-in"
          title="Gavino's Pizzeria map"
          loading="lazy"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d12921.487807113379!2d-83.990335!3d35.93787!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x6fbbaf840449daf6!2sGavino's+Pizzeria+%26+Italian+Restaurant!5e0!3m2!1sen!2sus!4v1456502538385"
        ></iframe>
      </div>
    </main>

    <div id="site-footer"></div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
