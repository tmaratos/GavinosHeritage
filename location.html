<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Visit Gavino's Pizzeria in Bearden, Knoxville — hours, map, and directions." />
    <title>Location | Gavino's Pizzeria and Restaurant</title>
    <link rel="icon" type="image/svg+xml" href="./assets/images/logo/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/logo/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/logo/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-page="location">
    <div id="site-header"></div>
    <div id="chalkboard-mount"></div>

    <header class="page-hero">
      <div class="container">
        <h1>Location &amp; Hours</h1>
        <p>Bearden — <span data-phone></span></p>
      </div>
    </header>

    <main class="section section--white">
      <div class="container">
        <div class="visit-layout visit-layout--light">
          <div class="info-grid visit-layout__info">
            <div class="info-block info-block--light fade-in">
              <h3>Address</h3>
              <p>
                <a href="https://maps.google.com/maps?q=5211+Kingston+Pike+Knoxville%2C+TN+37919" data-address></a>
              </p>
              <p><a href="tel:+18652005571" data-phone></a></p>
              <p class="visit-layout__cta">
                <a
                  class="btn btn--primary"
                  href="https://order.spoton.com/6369692730409da37ab0ee8a"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Order Online</a
                >
              </p>
            </div>
            <div class="info-block info-block--light fade-in">
              <h3>Hours</h3>
              <ul class="hours-list" id="hours-list"></ul>
              <p class="hours-note hours-note--alert" id="hours-note"></p>
            </div>
          </div>
          <div class="visit-layout__map fade-in">
            <iframe
              class="map-embed"
              title="Gavino's Pizzeria map"
              loading="lazy"
              allowfullscreen
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d12921.487807113379!2d-83.990335!3d35.93787!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x6fbbaf840449daf6!2sGavino's+Pizzeria+%26+Italian+Restaurant!5e0!3m2!1sen!2sus!4v1456502538385"
            ></iframe>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
    <script type="module" src="./src/js/main.js"></script>
  </body>
</html>
